<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>¡Gracias por participar! · Banpro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #f5f8f6;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
    color: #1a2e22;
  }
  .card {
    max-width: 480px;
    background: #fff;
    border-radius: 16px;
    padding: 44px 36px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(7,56,25,0.12);
    border: 1px solid rgba(15,138,60,0.08);
  }
  .check {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1aff64, #0f8a3c);
    display: grid; place-items: center;
    margin: 0 auto 22px;
    box-shadow: 0 12px 28px rgba(26,255,100,0.35);
    animation: pop 0.5s cubic-bezier(.5,1.8,.4,1);
  }
  @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
  h1 {
    font-family: 'Montserrat', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: #0f8a3c;
    margin-bottom: 10px;
  }
  p { color: #6b7d72; line-height: 1.6; font-size: 14.5px; margin-bottom: 26px; }
  a.btn {
    display: inline-block;
    background: linear-gradient(135deg, #0f8a3c, #1aa84a);
    color: #fff;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 13.5px;
    box-shadow: 0 8px 22px rgba(15,138,60,0.3);
    transition: transform 0.15s;
  }
  a.btn:hover { transform: translateY(-2px); }
</style>
</head>
<body>
  <div class="card">
    <div class="check">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>¡Solicitud enviada!</h1>
    <p>Gracias por participar en el sorteo Banpro. Hemos recibido tus datos correctamente. Te contactaremos si resultas ganador.</p>
    <a href="inicio.html" class="btn">Volver al inicio</a>
  </div>
</body>
</html>
